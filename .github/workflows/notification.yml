name: Migration + Sonar + Gitleaks Analysis
on:
  workflow_dispatch:

jobs:
  migrate-and-scan:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      issues: write

    steps:
      - name: Checkout pipeline repo
        uses: actions/checkout@v4

      - name: Install GHI extension
        env:
          GH_TOKEN: ${{ secrets.GH_TARGET_PAT }}
        run: |
          gh extension install github/gh-gei

      - name: Install Gitleaks
        run: |
          curl -sSLo gitleaks.tar.gz \
            https://github.com/gitleaks/gitleaks/releases/download/v8.18.4/gitleaks_8.18.4_linux_x64.tar.gz
          tar -xzf gitleaks.tar.gz gitleaks
          sudo mv gitleaks /usr/local/bin/gitleaks
          gitleaks version

      - name: Install Sonar Scanner
        run: |
          curl -sSLo sonar-scanner.zip https://binaries.sonarsource.com/Distribution/sonar-scanner-cli/sonar-scanner-cli-5.0.1.3006-linux.zip
          unzip sonar-scanner.zip
          mv sonar-scanner-* sonar-scanner
          echo "$PWD/sonar-scanner/bin" >> $GITHUB_PATH

      - name: Migrate and Scan Repos
        env:
          GH_TOKEN: ${{ secrets.GH_TARGET_PAT }}
          GH_SOURCE_PAT: ${{ secrets.GH_SOURCE_PAT }}
          GH_TARGET_PAT: ${{ secrets.GH_TARGET_PAT }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}
        run: |
          mkdir -p sarif-reports
          SECRETS_FOUND=0

          while read repo; do
            echo "=============================="
            echo "Processing $repo..."
            echo "=============================="

            # Migration
            gh gei migrate-repo \
              --github-source-org ambika-org2 \
              --github-target-org aberlia-org \
              --source-repo "$repo" \
              --target-repo "$repo" \
              --github-source-pat "$GH_SOURCE_PAT" \
              --github-target-pat "$GH_TARGET_PAT" || true

            # Clone repo
            git clone https://x-access-token:$GH_TARGET_PAT@github.com/aberlia-org/$repo.git
            cd "$repo"

            # Gitleaks scan
            echo "--- Running Gitleaks on $repo ---"
            gitleaks detect \
              --source . \
              --log-opts="--all" \
              --report-format sarif \
              --report-path "../sarif-reports/$repo.sarif" \
              --report-format json \
              --report-path "../sarif-reports/$repo.json" \
              --exit-code 1 \
              --verbose

            GITLEAKS_EXIT=$?

            if [ $GITLEAKS_EXIT -ne 0 ]; then
              echo "SECRETS DETECTED in $repo — skipping Sonar"
              SECRETS_FOUND=1
              echo "$repo" >> /tmp/failed_repos.txt
              cd ..
              rm -rf "$repo"
              continue
            fi

            echo "Gitleaks clean — running Sonar on $repo"

            sonar-scanner \
              -Dsonar.projectKey="$repo" \
              -Dsonar.organization=aberlia-org \
              -Dsonar.sources=. \
              -Dsonar.host.url=$SONAR_HOST_URL \
              -Dsonar.login=$SONAR_TOKEN

            cd ..
            rm -rf "$repo"

          done < repos.txt

          if [ $SECRETS_FOUND -eq 1 ]; then
            echo "SECRETS_FOUND=true" >> $GITHUB_ENV
          else
            echo "SECRETS_FOUND=false" >> $GITHUB_ENV
          fi

          if [ $SECRETS_FOUND -eq 1 ]; then
            echo "=========================================="
            echo "MIGRATION BLOCKED — secrets found"
            echo "=========================================="
            exit 1
          fi

      # ── Notify repo owner via GitHub issue (no email needed) ────────
      - name: Create issue and notify repo owner
        if: always() && env.SECRETS_FOUND == 'true'
        env:
          GH_TOKEN: ${{ secrets.GH_TARGET_PAT }}
        run: |
          # Create failed_repos.txt if it doesn't exist
          touch /tmp/failed_repos.txt

          while read repo; do
            [ -z "$repo" ] && continue
            echo "=============================="
            echo "Notifying owner of $repo..."
            echo "=============================="

            # Clone shallow copy just to read git history
            git clone --depth=50 \
              https://x-access-token:$GH_TOKEN@github.com/aberlia-org/$repo.git \
              temp-$repo
            cd temp-$repo

            # Extract contributor emails, filter out GitHub bots
            COMMITTER_EMAILS=$(git log --format='%ae' \
              | sort -u \
              | grep -v 'noreply' \
              | head -5)

            # Resolve each email to a GitHub username
            GITHUB_MENTIONS=""
            ASSIGNEES=""
            for email in $COMMITTER_EMAILS; do
              USERNAME=$(curl -s \
                -H "Authorization: token $GH_TOKEN" \
                "https://api.github.com/search/users?q=$email+in:email" \
                | python3 -c "
            import json,sys
            data=json.load(sys.stdin)
            items=data.get('items',[])
            print(items[0]['login'] if items else '')
            " 2>/dev/null)

              if [ -n "$USERNAME" ]; then
                GITHUB_MENTIONS="$GITHUB_MENTIONS @$USERNAME"
                if [ -z "$ASSIGNEES" ]; then
                  ASSIGNEES="\"$USERNAME\""
                else
                  ASSIGNEES="$ASSIGNEES,\"$USERNAME\""
                fi
                echo "Resolved $email → @$USERNAME"
              else
                echo "Could not resolve GitHub username for $email"
              fi
            done

            cd ..
            rm -rf temp-$repo

            # Build findings summary from JSON report
            FINDINGS="No JSON report found."
            if [ -f "sarif-reports/$repo.json" ]; then
              FINDINGS=$(python3 -c "
            import json, sys
            with open('sarif-reports/$repo.json') as f:
                data = json.load(f)
            if not data:
                print('No findings parsed.')
            else:
                for item in data:
                    print(f'- **{item[\"RuleID\"]}** in \`{item[\"File\"]}\` line {item[\"Line\"]} — by {item[\"Author\"]} on {item[\"Date\"][:10]}')
            " 2>/dev/null || echo "Could not parse findings — check pipeline logs.")
            fi

            # Create GitHub issue
            ISSUE_URL=$(gh issue create \
              --repo "aberlia-org/$repo" \
              --title "🚨 Secrets detected — migration blocked for $repo" \
              --label "security" \
              --body "## Secret scan failed for \`$repo\`

            Gitleaks detected hardcoded secrets in this repository's git history.
            **Migration to Opella has been blocked** until these are resolved.

            cc $GITHUB_MENTIONS — please action this.

            ---

            ## Findings

            $FINDINGS

            ---

            ## What to do

            1. **Rotate** all leaked credentials immediately at their provider (AWS, Vault, etc.)
            2. **Remove** secrets from git history:
               \`\`\`bash
               # Using BFG Repo Cleaner
               bfg --delete-files <filename>
               git reflog expire --expire=now --all
               git gc --prune=now --aggressive
               git push --force
               \`\`\`
            3. **Add** a \`.gitleaks.toml\` allowlist entry if any finding is a false positive
            4. **Re-run** the migration pipeline once resolved

            ---

            ## Pipeline run
            [View full scan logs](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})

            > This issue was automatically created by the Sanofi → Opella migration pipeline.")

            echo "Issue created: $ISSUE_URL"

            # Assign issue to discovered contributors
            if [ -n "$ASSIGNEES" ]; then
              ISSUE_NUMBER=$(echo $ISSUE_URL | grep -o '[0-9]*$')
              curl -s -X POST \
                -H "Authorization: token $GH_TOKEN" \
                -H "Accept: application/vnd.github.v3+json" \
                "https://api.github.com/repos/aberlia-org/$repo/issues/$ISSUE_NUMBER/assignees" \
                -d "{\"assignees\": [$ASSIGNEES]}"
              echo "Issue assigned to: $ASSIGNEES"
            fi

            # Comment on any open PRs
            OPEN_PRS=$(curl -s \
              -H "Authorization: token $GH_TOKEN" \
              "https://api.github.com/repos/aberlia-org/$repo/pulls?state=open" \
              | python3 -c "
            import json,sys
            prs=json.load(sys.stdin)
            for pr in prs: print(pr['number'])
            " 2>/dev/null)

            for pr_number in $OPEN_PRS; do
              curl -s -X POST \
                -H "Authorization: token $GH_TOKEN" \
                -H "Accept: application/vnd.github.v3+json" \
                "https://api.github.com/repos/aberlia-org/$repo/issues/$pr_number/comments" \
                -d "{\"body\": \"⚠️ **Migration blocked** — secrets detected in this repo. See $ISSUE_URL for details. $GITHUB_MENTIONS\"}"
              echo "Commented on PR #$pr_number"
            done

          done < /tmp/failed_repos.txt

      # ── Upload SARIF to GitHub Security tab ─────────────────────────
      - name: Upload Gitleaks SARIF reports
        if: always() && hashFiles('sarif-reports/*.sarif') != ''
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: sarif-reports
          category: gitleaks-migration

      # ── Archive reports as artifacts ─────────────────────────────────
      - name: Archive Gitleaks reports
        if: always() && hashFiles('sarif-reports/*.sarif') != ''
        uses: actions/upload-artifact@v4
        with:
          name: gitleaks-reports
          path: sarif-reports/
          retention-days: 30

      # ── Post summary ──────────────────────────────────────────────────
      - name: Post scan summary
        if: always()
        run: |
          echo "## Gitleaks Scan Summary" >> $GITHUB_STEP_SUMMARY
          if ls sarif-reports/*.sarif 1>/dev/null 2>&1; then
            echo "### Repos scanned:" >> $GITHUB_STEP_SUMMARY
            for f in sarif-reports/*.sarif; do
              echo "- $(basename $f .sarif)" >> $GITHUB_STEP_SUMMARY
            done
          fi
          if [ -f /tmp/failed_repos.txt ] && [ -s /tmp/failed_repos.txt ]; then
            echo "### Blocked repos (secrets found):" >> $GITHUB_STEP_SUMMARY
            while read repo; do
              echo "- $repo" >> $GITHUB_STEP_SUMMARY
            done < /tmp/failed_repos.txt
          fi
