name: Migration + Sonar + Gitleaks Analysis
on:
  workflow_dispatch:

jobs:
  migrate-and-scan:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      issues: write

    steps:
      - name: Checkout pipeline repo
        uses: actions/checkout@v4

      - name: Install GHI extension
        env:
          GH_TOKEN: ${{ secrets.GH_TARGET_PAT }}
        run: |
          gh extension install github/gh-gei

      - name: Install Gitleaks
        run: |
          curl -sSLo gitleaks.tar.gz \
            https://github.com/gitleaks/gitleaks/releases/download/v8.18.4/gitleaks_8.18.4_linux_x64.tar.gz
          tar -xzf gitleaks.tar.gz gitleaks
          sudo mv gitleaks /usr/local/bin/gitleaks
          gitleaks version

      - name: Install Sonar Scanner
        run: |
          curl -sSLo sonar-scanner.zip https://binaries.sonarsource.com/Distribution/sonar-scanner-cli/sonar-scanner-cli-5.0.1.3006-linux.zip
          unzip sonar-scanner.zip
          mv sonar-scanner-* sonar-scanner
          echo "$PWD/sonar-scanner/bin" >> $GITHUB_PATH

      - name: Migrate and Scan Repos
        env:
          GH_TOKEN: ${{ secrets.GH_TARGET_PAT }}
          GH_SOURCE_PAT: ${{ secrets.GH_SOURCE_PAT }}
          GH_TARGET_PAT: ${{ secrets.GH_TARGET_PAT }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}
        run: |
          mkdir -p sarif-reports
          touch /tmp/failed_repos.txt
          SECRETS_FOUND=0

          while read repo; do
            [ -z "$repo" ] && continue
            echo "=============================="
            echo "Processing $repo..."
            echo "=============================="

            # Migration
            gh gei migrate-repo \
              --github-source-org ambika-org2 \
              --github-target-org aberlia-org \
              --source-repo "$repo" \
