name: Migration + Sonar Analysis

on:
  workflow_dispatch:

jobs:
  migrate-and-scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout pipeline repo
        uses: actions/checkout@v3

      - name: Install GHI extension
        env:
          GH_TOKEN: ${{ secrets.GH_TARGET_PAT }}
        run: |
          gh extension install github/gh-gei

      - name: Install Sonar Scanner
        run: |
          sudo apt update
          sudo apt install unzip -y
          curl -sSLo sonar-scanner.zip https://binaries.sonarsource.com/Distribution/sonar-scanner-cli/sonar-scanner-cli-5.0.1.3006-linux.zip
          unzip sonar-scanner.zip
          mv sonar-scanner-* sonar-scanner
          echo "$PWD/sonar-scanner/bin" >> $GITHUB_PATH

      - name: Migrate and Scan Repos
        env:
          GH_TOKEN: ${{ secrets.GH_TARGET_PAT }}
          GH_SOURCE_PAT: ${{ secrets.GH_SOURCE_PAT }}
          GH_TARGET_PAT: ${{ secrets.GH_TARGET_PAT }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        run: |
          while read repo; do
            echo "Processing $repo..."

            gh gei migrate-repo \
              --github-source-org ambika-org2 \
              --github-target-org aberlia-org \
              --source-repo $repo \
              --target-repo $repo \
              --github-source-pat $GH_SOURCE_PAT \
              --github-target-pat $GH_TARGET_PAT || true

            git clone https://x-access-token:$GH_TARGET_PAT@github.com/aberlia-org/$repo.git

            cd $repo

            sonar-scanner \
              -Dsonar.projectKey=$repo \
              -Dsonar.organization=YOUR_ORG_NAME \
              -Dsonar.sources=. \
              -Dsonar.host.url=$SONAR_HOST_URL \
              -Dsonar.login=$SONAR_TOKEN

            cd ..
            rm -rf $repo

          done < repos.txt
