name: Multi Repo Migration

on:
  workflow_dispatch:

jobs:
  migrate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      # ✅ Proper GitHub CLI setup (NO apt)
      - name: Setup GitHub CLI
        uses: cli/cli-action@v2
        with:
          token: ${{ secrets.GH_TARGET_PAT }}

      # ✅ Install GHI extension
      - name: Install GHI extension
        run: gh extension install github/gh-gei

      # ✅ Verify auth
      - name: Verify auth
        run: gh auth status

      # ✅ Run migration
      - name: Run migration for repos
        env:
          GH_SOURCE_PAT: ${{ secrets.GH_SOURCE_PAT }}
          GH_TARGET_PAT: ${{ secrets.GH_TARGET_PAT }}
        run: |
          while read repo; do
            echo "=============================="
            echo "Migrating $repo..."
            echo "=============================="

            gh gei migrate-repo \
              --github-source-org ambika-org2 \
              --github-target-org aberlia-org \
              --source-repo $repo \
              --target-repo $repo \
              --github-source-pat $GH_SOURCE_PAT \
              --github-target-pat $GH_TARGET_PAT

          done < repos.txt
