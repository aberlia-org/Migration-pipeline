name: Multi Repo Migration

on:
  workflow_dispatch:

jobs:
  migrate:
    runs-on: ubuntu-latest

    env:   # ⭐ GLOBAL ENV (IMPORTANT FIX)
      GH_TOKEN: ${{ secrets.GH_TARGET_PAT }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Install GitHub CLI
        run: |
          sudo apt update
          sudo apt install gh -y

      - name: Verify GH CLI Auth
        run: |
          gh auth status

      - name: Install GHI extension
        run: |
          gh extension install github/gh-gei

      - name: Run migration for repos
        env:
          GH_SOURCE_PAT: ${{ secrets.GH_SOURCE_PAT }}
          GH_TARGET_PAT: ${{ secrets.GH_TARGET_PAT }}
        run: |
          while read repo; do
            echo "=============================="
            echo "Migrating $repo..."
            echo "=============================="

            gh gei migrate-repo \
              --github-source-org ambika-org2 \
              --github-target-org aberlia-org \
              --source-repo $repo \
              --target-repo $repo \
              --github-source-pat $GH_SOURCE_PAT \
              --github-target-pat $GH_TARGET_PAT

          done < repos.txt
