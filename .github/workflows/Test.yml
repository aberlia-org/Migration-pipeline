name: Migration + Sonar + Gitleaks AnalysisMain

on:
  workflow_dispatch:

jobs:
  migrate-and-scan:
    runs-on: ubuntu-latest
    steps:

      # CHECKOUT PIPELINE REPO

      - name: Checkout pipeline repo
        uses: actions/checkout@v3
        with:
          lfs: true

      # INSTALL GEI

      - name: Install GHE extension
        env:
          GH_TOKEN: ${{ secrets.GH_TARGET_PAT }}
        run: |
          gh extension install github/gh-gei

      # INSTALL SONAR SCANNER

      - name: Install Sonar Scanner
        run: |
          curl -sSLo sonar-scanner.zip https://binaries.sonarsource.com/Distribution/sonar-scanner-cli/sonar-scanner-cli-5.0.1.3006-linux.zip
          unzip sonar-scanner.zip
          mv sonar-scanner-* sonar-scanner
          echo "$PWD/sonar-scanner/bin" >> $GITHUB_PATH

      # INSTALL GITLEAKS

      - name: Install Gitleaks
        run: |
          wget https://github.com/gitleaks/gitleaks/releases/download/v8.18.2/gitleaks_8.18.2_linux_x64.tar.gz
          tar -xzf gitleaks_8.18.2_linux_x64.tar.gz
          chmod +x gitleaks
          sudo mv gitleaks /usr/local/bin/

      # MAIN PROCESS

      - name: Migrate and Scan Repos
        env:
          GH_TOKEN: ${{ secrets.GH_TARGET_PAT }}
          GH_SOURCE_PAT: ${{ secrets.GH_SOURCE_PAT }}
          GH_TARGET_PAT: ${{ secrets.GH_TARGET_PAT }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        run: |
          while read repo; do
            echo "====================================="
            echo "Processing repo: $repo"
            echo "====================================="

            # CLONE SOURCE REPO

            git clone https://x-access-token:$GH_SOURCE_PAT@github.com/ambika-org2/$repo.git source-$repo
            cd source-$repo

            # SONAR SCAN - SOURCE

            sonar-scanner \
              -Dsonar.projectKey=${repo}-source \
              -Dsonar.organization=aberlia-org \
              -Dsonar.sources=. \
              -Dsonar.host.url=$SONAR_HOST_URL \
              -Dsonar.login=$SONAR_TOKEN

            # GITLEAKS SCAN - SOURCE

            gitleaks detect \
              --source . \
              --report-path ../${repo}-gitleaks-report.json \
              --verbose
            cd ..
            rm -rf source-$repo

            # MIGRATION

            gh gei migrate-repo \
              --github-source-org ambika-org2 \
              --github-target-org aberlia-org \
              --source-repo $repo \
              --target-repo $repo \
              --github-source-pat $GH_SOURCE_PAT \
              --github-target-pat $GH_TARGET_PAT || true

            # SECRET HANDLING

            echo "Fetching source secret names..."

            GH_TOKEN=$GH_SOURCE_PAT gh secret list \
              --repo ambika-org2/$repo \
              --json name \
              -q '.[].name' > secret_names.txt

            echo "Detected secrets:"

            cat secret_names.txt

            echo "Creating placeholder secrets in target..."

            while read SECRET_NAME
            do
              [ -z "$SECRET_NAME" ] && continue

              echo "Creating: $SECRET_NAME"

              GH_TOKEN=$GH_TARGET_PAT gh secret set "$SECRET_NAME" \
                --repo aberlia-org/$repo \
                --body "TO_BE_UPDATED"

            done < secret_names.txt

            echo "Generating secret report..."

            echo "Repository: $repo" > secret_report.txt

            echo "Migration Status: SUCCESS" >> secret_report.txt

            echo "" >> secret_report.txt

            echo "Manual Secret Population Required" >> secret_report.txt

            echo "" >> secret_report.txt

            echo "Detected Source Secrets:" >> secret_report.txt

            while read SECRET_NAME
            do
              [ -z "$SECRET_NAME" ] && continue

              echo "- $SECRET_NAME" >> secret_report.txt

            done < secret_names.txt

            # CLONE TARGET REPO

            git clone https://x-access-token:$GH_TARGET_PAT@github.com/aberlia-org/$repo.git target-$repo
            cd target-$repo

            # SONAR SCAN - TARGET

            sonar-scanner \
              -Dsonar.projectKey=${repo}-target \
              -Dsonar.organization=aberlia-org \
              -Dsonar.sources=. \
              -Dsonar.host.url=$SONAR_HOST_URL \
              -Dsonar.login=$SONAR_TOKEN
            cd ..
            rm -rf target-$repo
          done < repos.txt

      # UPLOAD GITLEAKS REPORTS

      - name: Upload Gitleaks Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gitleaks-reports
          path: "*.json"
