name: Migration + Sonar + Gitleaks Analysis
on:
  workflow_dispatch:

jobs:
  migrate-and-scan:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write

    steps:
      # Checkout pipeline repo
      - name: Checkout pipeline repo
        uses: actions/checkout@v4

      # Install GEI — fixed: gh auth login before extension install
      - name: Install GHI extension
        env:
          GH_TOKEN: ${{ secrets.GH_TARGET_PAT }}
        run: |
          gh auth login --with-token <<< "$GH_TOKEN"
          gh extension install github/gh-gei

      # Install Gitleaks
      - name: Install Gitleaks
        run: |
          curl -sSLo gitleaks.tar.gz \
            https://github.com/gitleaks/gitleaks/releases/download/v8.18.4/gitleaks_8.18.4_linux_x64.tar.gz
          tar -xzf gitleaks.tar.gz gitleaks
          sudo mv gitleaks /usr/local/bin/gitleaks
          gitleaks version

      # Install Sonar Scanner
      - name: Install Sonar Scanner
        run: |
          curl -sSLo sonar-scanner.zip https://binaries.sonarsource.com/Distribution/sonar-scanner-cli/sonar-scanner-cli-5.0.1.3006-linux.zip
          unzip sonar-scanner.zip
          mv sonar-scanner-* sonar-scanner
          echo "$PWD/sonar-scanner/bin" >> $GITHUB_PATH

      # Migrate + Gitleaks + Sonar
      - name: Migrate and Scan Repos
        env:
          GH_TOKEN: ${{ secrets.GH_TARGET_PAT }}
          GH_SOURCE_PAT: ${{ secrets.GH_SOURCE_PAT }}
          GH_TARGET_PAT: ${{ secrets.GH_TARGET_PAT }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}
        run: |
          mkdir -p sarif-reports json-reports

          SECRETS_FOUND=0
          FAILED_REPOS=""

          while read repo; do
            echo "=============================="
            echo "Processing $repo..."
            echo "=============================="

            # Migration
            gh gei migrate-repo \
              --github-source-org ambika-org2 \
              --github-target-org aberlia-org \
              --source-repo "$repo" \
              --target-repo "$repo" \
              --github-source-pat "$GH_SOURCE_PAT" \
              --github-target-pat "$GH_TARGET_PAT" || true

            # Clone repo
            git clone https://x-access-token:$GH_TARGET_PAT@github.com/aberlia-org/$repo.git
            cd "$repo"

            # Gitleaks scan — full history, all branches
            echo "--- Running Gitleaks on $repo ---"
            gitleaks detect \
              --source . \
              --log-opts="--all" \
              --report-format sarif \
              --report-path "../sarif-reports/$repo.sarif" \
              --exit-code 1 \
              --verbose

            GITLEAKS_EXIT=$?

            if [ $GITLEAKS_EXIT -ne 0 ]; then
              echo "SECRETS DETECTED in $repo — skipping Sonar scan"
              SECRETS_FOUND=1
              FAILED_REPOS="$FAILED_REPOS $repo"
              cd ..
              rm -rf "$repo"
              continue
            fi

            echo "Gitleaks clean — running Sonar on $repo"

            # Sonar Scan
            sonar-scanner \
              -Dsonar.projectKey="$repo" \
              -Dsonar.organization=aberlia-org \
              -Dsonar.sources=. \
              -Dsonar.host.url=$SONAR_HOST_URL \
              -Dsonar.login=$SONAR_TOKEN

            cd ..
            rm -rf "$repo"

          done < repos.txt

          # Fail the job if any repo had secrets
          if [ $SECRETS_FOUND -eq 1 ]; then
            echo "=========================================="
            echo "MIGRATION BLOCKED — secrets found in:"
            echo "$FAILED_REPOS"
            echo "Rotate the leaked credentials and re-run."
            echo "=========================================="
            exit 1
          fi

      # Upload SARIF reports — fixed: v4, directory path, guard for empty
      - name: Upload Gitleaks SARIF reports
        if: always() && hashFiles('sarif-reports/*.sarif') != ''
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: sarif-reports
          category: gitleaks-migration

      # Archive SARIF + JSON as artifacts
      - name: Archive Gitleaks reports
        if: always() && hashFiles('sarif-reports/*.sarif') != ''
        uses: actions/upload-artifact@v4
        with:
          name: gitleaks-reports
          path: sarif-reports/
          retention-days: 30

      # Post summary to job output
      - name: Post scan summary
        if: always()
        run: |
          echo "## Gitleaks Scan Summary" >> $GITHUB_STEP_SUMMARY
          if ls sarif-reports/*.sarif 1>/dev/null 2>&1; then
            echo "Reports generated for:" >> $GITHUB_STEP_SUMMARY
            for f in sarif-reports/*.sarif; do
              echo "- $(basename $f .sarif)" >> $GITHUB_STEP_SUMMARY
            done
          else
            echo "No reports generated (pipeline may have failed before scan)" >> $GITHUB_STEP_SUMMARY
          fi
