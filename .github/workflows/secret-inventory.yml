name: Secret Inventory Report

on:
  workflow_dispatch:

jobs:
  secret-inventory:
    runs-on: ubuntu-latest
    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Verify GitHub CLI
        run: gh --version

      - name: Generate Secret Inventory Report
        env:
          GH_SOURCE_PAT: ${{ secrets.GH_SOURCE_PAT }}
        run: |
          export GH_TOKEN=$GH_SOURCE_PAT
          echo "Repository,SecretNames" > secret_inventory_report.csv
          echo "===== Repositories from File ====="
          cat secret_inventory_repos.txt
          while read REPO
          do
            if [ -z "$REPO" ]; then
              continue
            fi
            echo "Processing Repository: $REPO"
            SECRET_NAMES=$(gh secret list \
              --repo ABERLIA_ORG/$REPO \
              --json name \
              -q '.[].name' 2>/dev/null | paste -sd ";" -)
            if [ -z "$SECRET_NAMES" ]; then
              SECRET_NAMES="NO_SECRETS_FOUND"
            fi
            echo "$REPO,\"$SECRET_NAMES\"" >> secret_inventory_report.csv
          done < secret_inventory_repos.txt
          echo "===== Generated Report ====="
          cat secret_inventory_report.csv

      - name: Upload Report
        uses: actions/upload-artifact@v4
        with:
          name: secret-inventory-report
          path: secret_inventory_report.csv
