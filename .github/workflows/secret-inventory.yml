name: Secret Inventory Report
on:
 workflow_dispatch:
jobs:
 inventory:
   runs-on: ubuntu-latest
   env:
     SOURCE_ORG: your-org-name
   steps:
     - name: Checkout
       uses: actions/checkout@v4
     - name: Install GitHub CLI
       run: |
         gh --version
     - name: Get Repository List
       env:
         GH_TOKEN: ${{ secrets.GH_PAT }}
       run: |
         gh repo list $SOURCE_ORG \
           --limit 12000 \
           --json name \
           -q '.[].name' > repos.txt
         echo "Total repositories:"
         wc -l repos.txt
     - name: Generate Secret Report
       env:
         GH_TOKEN: ${{ secrets.GH_PAT }}
       run: |
         echo "Repository,SecretName" > secret_report.csv
         while read REPO
         do
           echo "Processing $REPO"
           gh secret list \
             --repo $SOURCE_ORG/$REPO \
             --json name \
             -q '.[].name' 2>/dev/null > secrets.txt
           if [ -s secrets.txt ]; then
             while read SECRET
             do
               echo "$REPO,$SECRET" >> secret_report.csv
             done < secrets.txt
           else
             echo "$REPO,NO_SECRETS" >> secret_report.csv
           fi
         done < repos.txt
     - name: Upload Report
       uses: actions/upload-artifact@v4
       with:
         name: secret-inventory-report
         path: secret_report.csv
